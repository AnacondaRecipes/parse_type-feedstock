{% set name = "parse_type" %}
{% set version = "0.6.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 513a3784104839770d690e04339a8b4d33439fcd5dd99f2e4580f9fc1097bfb2

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  skip: true  # [py<27]

requirements:
  host:
    - python
    - setuptools >=64
    - pip
    - wheel
    - setuptools-scm >=8
  run:
    - python
    - parse >=1.18.0  # [py>30]
    - parse >=1.13.1  # [py<=27]
    - enum34  # [py<34]
    - six >=1.15

test:
  source_files:
    - tests
  imports:
    - parse_type
    - parse_type.builder
    - parse_type.cardinality
    - parse_type.cardinality_field
    - parse_type.cfparse
    - parse_type.parse_util
  requires:
    - pip
    - pytest >=5.0
  commands:
    - pip check
    - python -c "from importlib.metadata import version; assert(version('{{ name }}')=='{{ version }}')"
    - pytest -v tests

about:
  home: https://github.com/jenisys/parse_type
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Simplifies to build parse types based on the parse module
  description: |
    parse_type extends the parse module (opposite of string.format()) with the following features:
    * build type converters for common use cases (enum/mapping, choice)
    * build a type converter with a cardinality constraint (0..1, 0..*, 1..*) from the type converter with cardinality=1.
    * compose a type converter from other type converters
    * an extended parser that supports the CardinalityField naming schema and creates missing type variants (0..1, 0..*, 1..*) from the primary type converter
  dev_url: https://github.com/jenisys/parse_type
  doc_url: https://github.com/jenisys/parse_type#parse_type

extra:
  recipe-maintainers:
    - stuertz
